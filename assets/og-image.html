<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<!-- Render this at 1200x630 and export as og-image.png (see README) -->
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,400..600&family=Nunito+Sans:wght@600;800&family=Caveat:wght@600&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  .card {
    width: 1200px; height: 630px; position: relative;
    font-family: "Nunito Sans", sans-serif; color: #3B2F25;
    background:
      radial-gradient(120% 90% at 88% -10%, #FBE7C2 0%, transparent 52%),
      radial-gradient(80% 80% at -5% 0%, #F4DAD1 0%, transparent 45%),
      #FCF6EA;
    padding: 84px 96px; display: flex; flex-direction: column; justify-content: center;
  }
  .sun { position: absolute; top: -120px; right: -100px; width: 360px; height: 360px; border-radius: 50%;
    background: radial-gradient(circle, #EBA63A 0%, #D5821F 62%, transparent 72%); opacity: .28; }
  .eyebrow { font-family: "Caveat", cursive; font-size: 46px; color: #C0603A; line-height: 1; margin-bottom: 8px; }
  h1 { font-family: "Fraunces", serif; font-weight: 560; font-size: 96px; line-height: 1.02; letter-spacing: -.02em; max-width: 18ch; }
  .accent { color: #D5821F; font-style: italic; }
  p { font-size: 30px; color: #6E5F50; margin-top: 26px; max-width: 30ch; }
  .brand { position: absolute; bottom: 70px; left: 96px; display: flex; align-items: center; gap: 18px; }
  .brand .name { font-family: "Fraunces", serif; font-size: 34px; font-weight: 600; }
  .brand .sub { font-size: 15px; font-weight: 800; letter-spacing: .2em; text-transform: uppercase; color: #C0603A; }
  .tag { position: absolute; bottom: 78px; right: 96px; font-family: "Caveat", cursive; font-size: 40px; color: #C0603A; }
</style>
</head>
<body>
  <div class="card">
    <div class="sun"></div>
    <svg width="84" height="84" viewBox="0 0 48 48" style="margin-bottom:18px">
      <circle cx="24" cy="24" r="9" fill="#EBA63A" stroke="#D5821F" stroke-width="2.5"/>
      <g stroke="#D5821F" stroke-width="2.5" stroke-linecap="round">
        <line x1="24" y1="5" x2="24" y2="11"/><line x1="24" y1="37" x2="24" y2="43"/>
        <line x1="5" y1="24" x2="11" y2="24"/><line x1="37" y1="24" x2="43" y2="24"/>
        <line x1="11" y1="11" x2="15" y2="15"/><line x1="33" y1="33" x2="37" y2="37"/>
        <line x1="37" y1="11" x2="33" y2="15"/><line x1="15" y1="33" x2="11" y2="37"/>
      </g>
      <path d="M24 25 C 19 20, 19 14, 24 9 C 29 14, 29 20, 24 25 Z" fill="#FCF6EA" stroke="#5F6B43" stroke-width="2"/>
    </svg>
    <p class="eyebrow">hello &amp; welcome</p>
    <h1>Strategic growth that helps your business <span class="accent">bloom.</span></h1>
    <p>Business development, growth strategy &amp; winning proposals.</p>
    <div class="brand">
      <div>
        <div class="name">Sunshine Growth Solutions</div>
      </div>
    </div>
    <div class="tag">where your business blooms</div>
  </div>
</body>
</html>
